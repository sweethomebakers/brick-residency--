<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brick Residency | Luxury Living</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      background-color: #ffffff; 
      color: #1a1a1a; 
      line-height: 1.6;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .container { width: 92%; max-width: 1200px; margin: auto; padding: 20px 0; }

    /* HERO */
    .hero {
      background: #f8fafc;

      border: 1px solid #e2e8f0;
      border-radius: 15px;
      margin-bottom: 40px;
    }

    /* PROPERTY CARDS */
    .property-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .property-card {
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      overflow: hidden;
      background: white;
      transition: transform 0.3s;
    }

    .property-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }

    .property-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .property-details { padding: 20px; }
    .price-tag { color: #2563eb; font-size: 1.4rem; font-weight: bold; display: block; margin: 10px 0; }

    /* SECTION TITLES */
    h2 { color: #1e3a8a; border-left: 5px solid #2563eb; padding-left: 15px; margin-bottom: 30px; }

      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 40px;
    }
