<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Residency | Official Developer Site | North Bangalore</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark: #0f172a;
            --accent: #2563eb;
            --soft-bg: #f8fafc;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; transition: 0.3s ease; }
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: #fff; 
            color: #334155; 
            line-height: 1.7;
        }

        /* NAVIGATION */
        header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.2rem; font-weight: 800; color: var(--dark); letter-spacing: 1px; }
        .rera-tag { font-size: 0.7rem; color: #15803d; background: #dcfce7; padding: 5px 12px; border-radius: 4px; font-weight: 600; }

        .container { max-width: 1100px; margin: auto; padding: 40px 20px; }

        /* PROJECT NARRATIVE */
        .hero-desc {
            text-align: center;
            padding: 40px 0 60px 0;
            max-width: 850px;
            margin: auto;
        }
        h2 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.5rem; 
            color: var(--dark); 
            margin-bottom: 20px;
        }
        .section-label { 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            font-weight: 700; 
            color: var(--accent); 
            letter-spacing: 3px;
            display: block;
            margin-bottom: 12px;
        }
        .desc-p { font-size: 1.1rem; color: #64748b; line-height: 1.8; }

        /* AMENITIES - GRID STYLE */
        .amenity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        .amenity-card {
            background: var(--soft-bg);
            padding: 30px 15px;
            text-align: center;
            border-radius: 12px;
            border: 1px solid transparent;
        }
        .amenity-card:hover {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .amenity-card i { font-size: 2rem; color: var(--accent); margin-bottom: 15px; }
        .amenity-card span { display: block; font-weight: 600; font-size: 0.9rem; color: var(--dark); }

        /* CONFIGURATIONS */
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .config-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: #fff; }
        .config-img { width: 100%; height: 260px; object-fit: cover; }
        .config-body { padding: 30px; text-align: center; }
        .price { font-size: 1.6rem; color: var(--accent); font-weight: 800; margin: 10px 0; }

        /* SPECIFICATIONS & INTEGRATED FORM */
        .spec-wrapper {
            background: var(--dark);
            color: white;
            padding: 60px 50px;
            border-radius: 20px;
            margin-top: 80px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 50px;
        }
        @media (max-width: 850px) { .spec-wrapper { grid-template-columns: 1fr; } }

        .spec-item { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .spec-item h4 { margin: 0 0 5px 0; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; }
        .spec-item p { margin: 0; font-size: 1.05rem; }

        .inquiry-box { 
            background: rgba(255,255,255,0.05); 
            padding: 40px; 
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            align-self: center;
        }
        .mini-input {
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1); color: white; font-size: 1rem;
        }
        .btn-premium {
            width: 100%; background: var(--accent); color: white; padding: 16px; border: none;
            border-radius: 8px; font-weight: 700; cursor: pointer; letter-spacing: 1px;
        }

        /* FLOATING CONTACTS */
        .float-contact {
            position: fixed; right: 25px; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; text-decoration: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 1000;
        }
        .wa { bottom: 25px; background: #25d366; }
        .call { bottom: 90px; background: var(--accent); }

        footer { text-align: center; padding: 60px; background: var(--soft-bg); color: #64748b; font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <div class="logo">BRICK RESIDENCY</div>
    <div class="rera-tag">RERA: PRM/KA/1251/446</div>
</header>

<div class="container">
