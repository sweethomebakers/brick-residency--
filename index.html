<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Residency | Premium North Bangalore Living</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 1. CORE STYLES - Solid colors to prevent blank screen */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: #f4f7f6; /* Soft professional grey */
            color: #2c3e50; 
            line-height: 1.6;
        }

        /* 2. HEADER */
        header {
            background-color: #0f172a; /* Deep Navy */
            color: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #2563eb;
        }

        .container { max-width: 1100px; margin: auto; padding: 20px; }

        /* 3. ABOUT SECTION */
        .section-white {
            background: white;
            padding: 40px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 { color: #0f172a; border-left: 5px solid #2563eb; padding-left: 15px; margin-bottom: 20px; }

        /* 4. CONFIGURATIONS (2BHK, 3BHK, DUPLEX) */
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .config-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
        }
        .config-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .config-body { padding: 20px; }
        .price { font-size: 1.5rem; color: #2563eb; font-weight: bold; margin: 10px 0; }

        /* 5. AMENITIES & NEARBY */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            text-align: center;
        }
        .icon-box { background: #eef2ff; padding: 20px; border-radius: 8px; }
        .icon-box i { font-size: 2rem; color: #2563eb; margin-bottom: 10px; }

        /* 6. ENQUIRY FORM */
        .enquiry-form {
            background: #0f172a;
            color: white;
            padding: 40px;
            border-radius: 10px;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: none;
        }
        .btn-call {
            background: #2563eb;
            color: white;
            padding: 15px 30px;
            border: none;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }

        footer { text-align: center; padding: 40px; color: #7f8c8d; }
    </style>
</head>
